<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Drama Scenario Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter,system-ui;
background:linear-gradient(135deg,#f4efe9,#e8e2da);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:900px;
max-width:92vw;
}

.title{
font-family:"Playfair Display",serif;
font-size:48px;
letter-spacing:4px;
margin-bottom:6px;
}

.subtitle{
opacity:.7;
margin-bottom:30px;
}

.card{
background:linear-gradient(160deg,#f6ede5,#e7d8ca);
padding:45px;
border-radius:18px;
box-shadow:0 18px 50px rgba(0,0,0,.15);
text-align:center;
}

button{
border:none;
border-radius:30px;
padding:16px 36px;
font-size:18px;
cursor:pointer;
}

.generateBtn{
background:linear-gradient(90deg,#c25400,#e87a2f);
color:white;
margin-bottom:30px;
}

.setting{
font-size:32px;
font-family:"Playfair Display",serif;
margin-top:20px;
}

.problem{
font-size:26px;
margin-top:16px;
}

.label{
letter-spacing:2px;
font-size:14px;
opacity:.7;
margin-top:30px;
}

.topControls{
position:absolute;
top:20px;
right:30px;
}

.smallBtn{
background:white;
padding:8px 14px;
margin-left:8px;
border-radius:8px;
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:16px;
margin-top:25px;
}

.groupCard{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 8px 25px rgba(0,0,0,.1);
font-size:20px;
}

.hidden{
display:none;
}

.groupControls{
margin-top:20px;
text-align:center;
}

input{
padding:8px;
font-size:16px;
}

</style>
</head>

<body>

<div class="topControls">
<button class="smallBtn" onclick="toggleFullscreen()">Fullscreen</button>
<button class="smallBtn" onclick="setMode('carousel')">Carousel</button>
<button class="smallBtn" onclick="setMode('groups')">Groups</button>
</div>

<div class="container">

<div class="title">DRA_MA_S</div>
<div class="subtitle">Story Scenarios & Conflicts</div>

<div class="card">

<button class="generateBtn" onclick="generateCards()">Generate Scenario</button>

<div id="carouselMode">

<div class="label">SETTING</div>
<div id="settingCard" class="setting">—</div>

<div class="label">CONFLICT</div>
<div id="problemCard" class="problem">—</div>

</div>

<div id="groupsMode" class="hidden">

<div class="groupControls">
<label>Groups:</label>
<input id="groupCount" type="number" value="4" min="1" max="20">
<button onclick="generateGroups()">Generate</button>
</div>

<div id="groupGrid" class="grid"></div>

</div>

</div>

</div>

<script>

const settings=[
"Playground","Forest","Spaceship","Classroom","Restaurant","Beach","Haunted House","Zoo","Camping Trip","Secret Laboratory","Medieval Castle","Underwater City","Mountain Summit","Desert Island","Amusement Park","Airport","Train Station","Pirate Ship","Hospital","Fire Station","Police Station","Movie Set","TV Studio","Bakery","Museum","Art Gallery","Skating Rink","Ski Hill","Jungle","Arctic Research Base","Volcano Edge","Space Station","Time Machine","Ancient Egypt","Dinosaur Park","Carnival","Farm","Pet Store","Aquarium","Library After Dark","School Bus","Submarine","Treehouse","Magic School","Courtroom","City Rooftop","Hidden Cave","Treasure Island","Science Fair","Video Game World"
];

const problems=[
"Something important is lost.","A rule has been broken.","Someone is afraid.","A big mistake was made.","Two characters disagree.","Something unexpected happens.","A secret is revealed.","There is not enough time.","Someone refuses to help.","An object stops working.","A surprise visitor arrives.","The lights go out.","A plan goes wrong.","Someone tells a lie.","A competition begins.","Someone feels left out.","Something valuable breaks.","A storm is coming.","Two friends want the same thing.","A misunderstanding causes trouble.","A challenge must be completed.","Someone overhears a secret.","A new student arrives.","Someone must make a difficult choice.","An animal escapes.","A treasure map is found.","Someone gets stuck.","The wrong message is delivered.","A race against time begins.","A promise is broken.","A strange noise is heard.","Someone is blamed unfairly.","Someone loses their voice.","An invention goes out of control.","A surprise test is announced.","Someone must work with someone they dislike.","Food runs out.","A door will not open.","Someone forgets something important.","A mysterious package appears."
];

let usedCombinations=new Set();
let lastProblem=null;

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function generateCards(){

let setting,problem,key

do{
setting=rand(settings)
problem=rand(problems)
key=setting+"|"+problem
}
while(
usedCombinations.has(key) ||
problem===lastProblem
)

usedCombinations.add(key)
lastProblem=problem

settingCard.textContent=setting
problemCard.textContent=problem

}

function generateGroups(){

const count=parseInt(groupCount.value)
const grid=document.getElementById("groupGrid")

grid.innerHTML=""

for(let i=1;i<=count;i++){

let setting=rand(settings)
let problem=rand(problems)

const div=document.createElement("div")

div.className="groupCard"

div.innerHTML=`
<b>Group ${i}</b><br><br>
<b>Setting:</b> ${setting}<br>
<b>Problem:</b> ${problem}
`

grid.appendChild(div)

}

}

function setMode(mode){

carouselMode.classList.add("hidden")
groupsMode.classList.add("hidden")

if(mode==="carousel"){
carouselMode.classList.remove("hidden")
}
else{
groupsMode.classList.remove("hidden")
}

}

function toggleFullscreen(){

if(!document.fullscreenElement){
document.documentElement.requestFullscreen()
}
else{
document.exitFullscreen()
}

}

</script>

</body>
</html>
