<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drama Card Generator</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        width: 400px;
        text-align: center;
    }
    h1 {
        margin-bottom: 20px;
    }
    .card {
        background-color: #eef2ff;
        padding: 20px;
        margin: 15px 0;
        border-radius: 10px;
        font-size: 18px;
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    button {
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin: 5px;
    }
    .generate {
        background-color: #4f46e5;
        color: white;
    }
    .reset {
        background-color: #e5e7eb;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Drama Card Generator</h1>
    
    <div>
        <strong>Setting</strong>
        <div id="settingCard" class="card">Click generate</div>
    </div>

    <div>
        <strong>Problem</strong>
        <div id="problemCard" class="card">Click generate</div>
    </div>

    <button class="generate" onclick="generateCards()">Generate Cards</button>
    <button class="reset" onclick="resetCards()">Reset</button>
</div>

<script>
const settings = [
    "Playground",
    "Forest",
    "Spaceship",
    "Classroom",
    "Restaurant",
    "Beach",
    "Haunted House",
    "Zoo",
    "Camping Trip",
    "Secret Laboratory"
];

const problems = [
    "Something important is lost.",
    "A rule has been broken.",
    "Someone is afraid of something.",
    "A big mistake was made.",
    "Two characters disagree.",
    "Something unexpected happens.",
    "A secret is revealed.",
    "There is not enough time.",
    "Someone refuses to help.",
    "An object stops working."
];

function getRandomItem(array) {
    return array[Math.floor(Math.random() * array.length)];
}

function generateCards() {
    document.getElementById("settingCard").textContent = getRandomItem(settings);
    document.getElementById("problemCard").textContent = getRandomItem(problems);
}

function resetCards() {
    document.getElementById("settingCard").textContent = "Click generate";
    document.getElementById("problemCard").textContent = "Click generate";
}
</script>

</body>
</html>
