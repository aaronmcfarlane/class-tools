<style>

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {

  header {
    background: var(--color-surface);

    z-index: 100;

  header h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--color-text);
    margin-bottom: 0.25rem;
  }
  header p.subtitle {
    font-size: 13px;
    color: var(--color-muted);
    margin-bottom: 1rem;
  }
  .controls-row {
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    align-items: flex-start;
  }
  .control-group { display: flex; flex-direction: column; gap: 6px; }
  .control-group label.group-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--color-muted);
  }
  .toggle-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .toggle-item { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .toggle-item span.toggle-label { font-size: 13px; font-weight: 500; }

  /* Toggle switch */
  .toggle-switch {
    position: relative; width: 36px; height: 20px; flex-shrink: 0;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0;
    border-radius: 20px;
    background: #d0cfc8;
    transition: background 0.2s;
    cursor: pointer;
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    left: 3px; top: 3px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle-switch input:checked + .toggle-slider { background: var(--toggle-color, #534AB7); }
  .toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); }

  /* Grade-specific toggle colors */
  .grade-1 .toggle-slider { --toggle-color: var(--color-grade1); }
  .grade-2 .toggle-slider { --toggle-color: var(--color-grade2); }
  .grade-3 .toggle-slider { --toggle-color: var(--color-grade3); }
  .grade-4 .toggle-slider { --toggle-color: var(--color-grade4); }
  .grade-5 .toggle-slider { --toggle-color: var(--color-grade5); }
  .grade-6 .toggle-slider { --toggle-color: var(--color-grade6); }

  .strand-toggle .toggle-slider { --toggle-color: #2c2c2a; }

  main { padding: 1.5rem 2rem; max-width: 1100px; margin: 0 auto; }

  /* Strand accordion */
  .strand-block {
    background: var(--color-surface);
    border: 0.5px solid var(--color-border-mid);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    transition: opacity 0.2s;
  }
  .strand-block.hidden { display: none; }
  .strand-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    cursor: pointer;
    user-select: none;
    background: var(--strand-header-bg, #f5f4f0);
    border-bottom: 0.5px solid transparent;
    transition: background 0.15s;
  }
  .strand-header:hover { filter: brightness(0.97); }
  .strand-header.open { border-bottom-color: var(--color-border); }
  .strand-header-left { display: flex; align-items: center; gap: 10px; }
  .strand-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--strand-color, #888);
    flex-shrink: 0;
  }
  .strand-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--color-text);
  }
  .strand-sub {
    font-size: 12px;
    color: var(--color-muted);
    margin-left: 4px;
  }
  .chevron {
    width: 18px; height: 18px;
    border-right: 2px solid var(--color-muted);
    border-bottom: 2px solid var(--color-muted);
    transform: rotate(45deg);
    margin-right: 4px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .strand-header.open .chevron { transform: rotate(-135deg); }

  .strand-body { display: none; padding: 0; }
  .strand-body.open { display: block; }

  /* Sub-strands */
  .substrand {
    border-bottom: 0.5px solid var(--color-border);
    padding: 0.85rem 1.25rem;
  }
  .substrand:last-child { border-bottom: none; }
  .substrand-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--color-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.6rem;
  }
  .grade-cells {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .grade-cell {
    flex: 1;
    min-width: 140px;
    background: var(--color-bg);
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--color-border);
    padding: 0.65rem 0.75rem;
    transition: opacity 0.2s;
  }
  .grade-cell.hidden { display: none; }
  .grade-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }
  .grade-cell ul {
    list-style: none;
    padding: 0;
  }
  .grade-cell ul li {
    font-size: 12.5px;
    color: var(--color-text);
    padding: 2px 0;
    border-bottom: 0.5px solid var(--color-border);
    line-height: 1.45;
  }
  .grade-cell ul li:last-child { border-bottom: none; }
  .grade-cell ul li::before {
    content: '·';
    color: var(--color-muted);
    margin-right: 5px;
    font-weight: 700;
  }
  .no-grades-msg {
    padding: 1.5rem 1.25rem;
    text-align: center;
    color: var(--color-muted);
    font-size: 13px;
  }

  .grade-tag-2 { background: #E1F5EE; color: #085041; }
  .grade-tag-3 { background: #FAECE7; color: #712B13; }
  .grade-tag-4 { background: #E6F1FB; color: #0C447C; }
  .grade-tag-5 { background: #FAEEDA; color: #633806; }

    text-align: center;
    padding: 3rem 1rem;
    color: var(--color-muted);
  }
  .btn-row { display: flex; gap: 8px; margin-top: 8px; }
  button.text-btn {
    background: none; border: 0.5px solid var(--color-border-mid);
    border-radius: var(--radius-sm); padding: 4px 10px;
    font-size: 12px; cursor: pointer; color: var(--color-muted);
    transition: background 0.15s;
  }
  button.text-btn:hover { background: var(--color-border); }
</style>

function buildGradeToggles() {
  const container = document.getElementById('grade-toggles');
  GRADES.forEach(g => {
    const label = document.createElement('label');
    label.className = `toggle-item grade-${g}`;
    label.innerHTML = `
      <label class="toggle-switch grade-${g}">
        <input type="checkbox" checked data-grade="${g}" onchange="toggleGrade(${g}, this.checked)">
        <span class="toggle-slider"></span>
      </label>
      <span class="toggle-label" style="color:var(--color-grade${g})">Grade ${g}</span>
    `;
    container.appendChild(label);
  });
}

function buildStrandToggles() {
  const container = document.getElementById('strand-toggles');
  data.strands.forEach(s => {
    activeStrands.add(s.id);
    const label = document.createElement('label');
    label.className = 'toggle-item strand-toggle';
    label.innerHTML = `
      <label class="toggle-switch strand-toggle">
        <input type="checkbox" checked data-strand="${s.id}" onchange="toggleStrand('${s.id}', this.checked)" style="--toggle-color:${STRAND_COLORS[s.id]}">
        <span class="toggle-slider" style="--toggle-color:${STRAND_COLORS[s.id]}"></span>
      </label>
      <span class="toggle-label" style="color:${STRAND_COLORS[s.id]};font-size:12px">${s.name}</span>
    `;
    container.appendChild(label);
  });
}

function buildContent() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';
  data.strands.forEach(strand => {
    const block = document.createElement('div');
    block.className = 'strand-block';
    block.id = `strand-${strand.id}`;
    if (!activeStrands.has(strand.id)) block.classList.add('hidden');

    const header = document.createElement('div');
    header.className = 'strand-header';
    header.style.setProperty('--strand-header-bg', STRAND_BG[strand.id] || '#f5f4f0');
    header.innerHTML = `
      <div class="strand-header-left">
        <div class="strand-dot" style="background:${STRAND_COLORS[strand.id]}"></div>
        <span class="strand-name">${strand.name}</span>
        <span class="strand-sub">${strand.subStrands.length} sub-strand${strand.subStrands.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="chevron"></div>
    `;
    header.onclick = () => {
      header.classList.toggle('open');
      body.classList.toggle('open');
    };

    const body = document.createElement('div');
    body.className = 'strand-body';

    strand.subStrands.forEach(ss => {
      const sub = document.createElement('div');
      sub.className = 'substrand';
      sub.innerHTML = `<div class="substrand-title">${ss.title}</div>`;

      const cells = document.createElement('div');
      cells.className = 'grade-cells';

      GRADES.forEach(g => {
        const items = ss.grades[g];
        const cell = document.createElement('div');
        cell.className = `grade-cell grade-cell-${g}`;
        if (!activeGrades.has(g)) cell.classList.add('hidden');
        if (!items || items.length === 0) {
          cell.innerHTML = `<span class="grade-tag grade-tag-${g}">Grade ${g}</span><ul><li style="color:var(--color-muted);font-style:italic">Continues from prior grade</li></ul>`;
        } else {
          const lis = items.map(i => `<li>${i}</li>`).join('');
          cell.innerHTML = `<span class="grade-tag grade-tag-${g}">Grade ${g}</span><ul>${lis}</ul>`;
        }
        cells.appendChild(cell);
      });

      sub.appendChild(cells);
      body.appendChild(sub);
    });

    block.appendChild(header);
    block.appendChild(body);
    main.appendChild(block);
  });
}

function toggleGrade(grade, on) {
  if (on) activeGrades.add(grade);
  else activeGrades.delete(grade);
  document.querySelectorAll(`.grade-cell-${grade}`).forEach(el => {
    el.classList.toggle('hidden', !on);
  });
}

function toggleStrand(id, on) {
  if (on) activeStrands.add(id);
  else activeStrands.delete(id);
  const block = document.getElementById(`strand-${id}`);
  if (block) block.classList.toggle('hidden', !on);
}

function setAllGrades(on) {
  GRADES.forEach(g => {
    if (on) activeGrades.add(g);
    else activeGrades.delete(g);
    document.querySelectorAll(`.grade-cell-${g}`).forEach(el => el.classList.toggle('hidden', !on));
  });
  document.querySelectorAll('[data-grade]').forEach(cb => cb.checked = on);
}

function setAllStrands(on) {
  data.strands.forEach(s => {
    if (on) activeStrands.add(s.id);
    else activeStrands.delete(s.id);
    const block = document.getElementById(`strand-${s.id}`);
    if (block) block.classList.toggle('hidden', !on);
  });
  document.querySelectorAll('[data-strand]').forEach(cb => cb.checked = on);
}

buildGradeToggles();
buildStrandToggles();
buildContent();
</script>
