<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monster Group Maker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing:border-box; }

body {
    margin:0;
    font-family:"Segoe UI",sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

/* MONSTERS */
.monster {
    position:fixed;
    font-size:26px;
    opacity:0.12;
    pointer-events:none;
}

/* LAYOUT */
.container {
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.grid {
    display:grid;
    grid-template-columns:260px 1fr;
    gap:20px;
}

.card {
    background:white;
    border-radius:16px;
    padding:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

textarea {
    width:100%;
    height:300px;
    border-radius:12px;
    padding:10px;
}

/* STUDENTS */
.students {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.student {
    background:#fff0f5;
    padding:6px 10px;
    border-radius:12px;
    display:flex;
    gap:6px;
    align-items:center;
}

/* BUTTONS */
button {
    background:#ff7eb3;
    border:none;
    color:white;
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
    transition:0.15s;
}
button.active {
    outline:3px solid #ff4d88;
    transform:scale(1.05);
}
button:active {
    transform:scale(0.95);
}

.top-actions {
    position:fixed;
    top:10px;
    right:10px;
    display:flex;
    gap:10px;
}

/* GROUPS */
.groups-card { margin-top:20px; }

.groups {
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.group {
    background:#e6f7ff;
    border-radius:14px;
    padding:15px;
    min-width:200px;
}

/* draggable */
.member {
    padding:4px;
    border-radius:8px;
    cursor:pointer;
}
.member.dragging {
    opacity:0.5;
}

/* TABS */
.tabs {
    display:flex;
    gap:10px;
    margin-bottom:10px;
}
.tab {
    padding:6px 10px;
    border-radius:10px;
    background:#eee;
    cursor:pointer;
}
.tab.active { background:#ff7eb3; color:white; }

.hidden { display:none; }

/* FULLSCREEN */
.fullscreen .grid,
.fullscreen .tabs,
.fullscreen .card:not(.groups-card),
.fullscreen h2 {
    display:none;
}
.fullscreen .groups {
    justify-content:center;
    align-items:center;
    height:90vh;
    font-size:2em;
}
</style>
</head>

<body>

<div class="top-actions">
<button onclick="shuffleGroups()">🔀 Shuffle</button>
<button onclick="toggleFullscreen()">🖥 Full Screen</button>
</div>

<div class="container" id="app">

<h2>👾 Monster Group Maker</h2>

<div class="tabs">
<div class="tab active" onclick="showTab(event,'main')">Main</div>
<div class="tab" onclick="showTab(event,'constraints')">Constraints</div>
</div>

<div id="mainTab">

<div class="grid">

<div class="card">
<textarea id="names"></textarea>

<select onchange="loadPreset(this.value)">
<option value="">Load Class</option>
<option value="mcfarlane">Mr. McFarlane Grade 4</option>
</select>

<div style="display:flex;gap:5px;margin-top:10px;">
<button id="modeSize" class="active" onclick="setMode('size')">Size</button>
<button id="modeCount" onclick="setMode('count')">Groups</button>
<input type="number" id="modeValue" value="3" style="width:70px;">
</div>

<button onclick="generate(event)" style="margin-top:10px;width:100%;">Generate</button>
</div>

<div class="card">
<div id="studentList" class="students"></div>
</div>

</div>
</div>

<!-- CONSTRAINTS -->
<div id="constraintsTab" class="hidden card">
<h3>Constraints</h3>

<div style="display:flex;gap:5px;margin-bottom:10px;">
<input id="pairA" placeholder="Student A">
<input id="pairB" placeholder="Student B">
<button onclick="addConstraint('must')">Must Pair</button>
<button onclick="addConstraint('avoid')">Do Not Pair</button>
</div>

<ul id="constraintList"></ul>
</div>

<div class="groups-card card">
<h3>Groups</h3>
<div id="groups" class="groups"></div>
</div>

</div>

<script>
const groupsEl = document.getElementById("groups");
const studentList = document.getElementById("studentList");
const mainTab = document.getElementById("mainTab");
const constraintsTab = document.getElementById("constraintsTab");

const monsters=["👾","👻","🐸","🐙","🦄","🐵","👹","🐱","🐼","🐰","🐯","🐨","🐮","🐷","🐧","🦊","🐻","🐔","🐢","🐍","🦖","🐲","🦕","🐺","🦁","🐗","🐬","🦈","🐝","🐞"];

let mode="size";
let allStudents=[], present=new Set(), groups=[];
let dragItem=null, selected=null;
let constraints=[];

/* persistence */
function save(){
localStorage.setItem("groupMaker",JSON.stringify({
names:names.value,
constraints
}));
}
function load(){
let data=JSON.parse(localStorage.getItem("groupMaker")||"{}");
if(data.names) names.value=data.names;
if(data.constraints) constraints=data.constraints;
renderConstraints();
}
load();

/* UI */
function showTab(e,t){
mainTab.classList.toggle("hidden",t!=="main");
constraintsTab.classList.toggle("hidden",t!=="constraints");
document.querySelectorAll(".tab").forEach(el=>el.classList.remove("active"));
e.target.classList.add("active");
}

function setMode(m){
mode=m;
modeSize.classList.toggle("active",m==="size");
modeCount.classList.toggle("active",m==="count");
modeValue.value=(m==="size")?3:6;
}

function loadPreset(v){
if(v==="mcfarlane"){
names.value=`Adam
Alec
Aliyah
Alyssa
Anika
Anna
Ayden
Clyde
Émylie-Maude
Jonathan
Joshua
Julian
Junior
Maejor
Max
Niaganii
Phoenix
Samuel`;
}
}

/* generate */
function generate(e){
let btn=e.target;
btn.textContent="Generating...";

try{
allStudents=names.value.split("\n").map(x=>x.trim()).filter(x=>x);
present=new Set(allStudents);

renderStudents();
buildGroups();
save();
}catch(err){
console.error(err);
alert("Error generating groups");
}

btn.textContent="Generate";
}

/* students */
function renderStudents(){
studentList.innerHTML="";
allStudents.forEach(n=>{
let d=document.createElement("div");
d.className="student";
d.innerHTML=`${getMonster(n)} ${n} <input type="checkbox" checked>`;
d.querySelector("input").onchange=e=>{
e.target.checked?present.add(n):present.delete(n);
buildGroups();
};
studentList.appendChild(d);
});
}

/* SMART GROUPING */
function buildGroups(){
let list=[...present];

if(list.length===0){
groupsEl.innerHTML="<p>No students selected</p>";
return;
}

let value=parseInt(modeValue.value)||3;

for(let attempt=0;attempt<50;attempt++){

let shuffled=[...list].sort(()=>Math.random()-0.5);

/* apply must-pairs (merge) */
let merged=[];
let used=new Set();

constraints.filter(c=>c.type==="must").forEach(c=>{
if(!used.has(c.a)&&!used.has(c.b)){
merged.push([c.a,c.b]);
used.add(c.a);used.add(c.b);
}
});

shuffled.forEach(s=>{
if(!used.has(s)) merged.push([s]);
});

/* create groups */
let tempGroups=[];

if(mode==="size"){
let current=[];
merged.forEach(chunk=>{
if(current.length+chunk.length>value){
tempGroups.push(current);
current=[];
}
current=current.concat(chunk);
});
if(current.length) tempGroups.push(current);
}else{
let count=value;
tempGroups=Array.from({length:count},()=>[]);
merged.forEach((chunk,i)=>{
tempGroups[i%count]=tempGroups[i%count].concat(chunk);
});
}

/* check avoid constraints */
let bad=false;
constraints.filter(c=>c.type==="avoid").forEach(c=>{
tempGroups.forEach(g=>{
if(g.includes(c.a)&&g.includes(c.b)) bad=true;
});
});

if(!bad){
groups=tempGroups;
renderGroups();
return;
}
}

/* fallback */
groups=[list];
renderGroups();
}

/* render groups */
function renderGroups(){
groupsEl.innerHTML="";

groups.forEach((g,i)=>{
let d=document.createElement("div");
d.className="group";
d.innerHTML="<h4>Group "+(i+1)+"</h4>";

d.ondragover=e=>e.preventDefault();
d.ondrop=()=>{
if(dragItem){
groups.forEach(gr=>{
let idx=gr.indexOf(dragItem);
if(idx>-1) gr.splice(idx,1);
});
g.push(dragItem);
renderGroups();
}
};

g.forEach(n=>{
let el=document.createElement("div");
el.className="member";
el.draggable=true;
el.textContent=getMonster(n)+" "+n;

el.ondragstart=()=>{dragItem=n;};
el.ondragend=()=>{dragItem=null;};

/* TOUCH */
el.onclick=()=>{
if(!selected){
selected=n;
el.style.outline="2px solid red";
}else{
groups.forEach(gr=>{
let idx=gr.indexOf(selected);
if(idx>-1) gr.splice(idx,1);
});
g.push(selected);
selected=null;
renderGroups();
}
};

d.appendChild(el);
});

groupsEl.appendChild(d);
});
}

/* constraints */
function addConstraint(type){
let a=pairA.value.trim();
let b=pairB.value.trim();
if(!a||!b) return;

constraints.push({a,b,type});
pairA.value="";pairB.value="";
renderConstraints();
save();
}

function renderConstraints(){
constraintList.innerHTML="";
constraints.forEach((c,i)=>{
let li=document.createElement("li");
li.textContent=`${c.a} ${c.type==="must"?"↔":"✖"} ${c.b}`;

let del=document.createElement("button");
del.textContent="X";
del.onclick=()=>{
constraints.splice(i,1);
renderConstraints();
save();
};

li.appendChild(del);
constraintList.appendChild(li);
});
}

function getMonster(n){
return monsters[[...n].reduce((a,c)=>a+c.charCodeAt(0),0)%monsters.length];
}

function shuffleGroups(){ buildGroups(); }
function toggleFullscreen(){ app.classList.toggle("fullscreen"); }
</script>

</body>
</html>
