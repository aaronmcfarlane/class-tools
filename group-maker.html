<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Group Maker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 16px;
    width: 100%;
    max-width: 1000px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h2 { margin-top: 0; }

.layout {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

/* Left panel */
.left {
    flex: 0 0 220px;
    display: flex;
    flex-direction: column;
}

textarea {
    height: 400px;
    width: 100%;
    border-radius: 10px;
    border: 1px solid #ccc;
    padding: 10px;
    resize: vertical;
}

/* Controls */
.controls {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.controls input[type="number"] {
    width: 100%;
}

button {
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    background: #667eea;
    color: white;
    cursor: pointer;
}

/* Student list */
.students {
    flex: 1;
    min-width: 250px;
    max-height: 400px;
    overflow-y: auto;
    border-left: 1px solid #eee;
    padding-left: 15px;
}

.student-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 4px;
    border-bottom: 1px solid #f0f0f0;
}

/* Toggle switch */
.switch {
    position: relative;
    width: 36px;
    height: 20px;
}

.switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background-color: #ccc;
    border-radius: 20px;
    transition: .2s;
}

.slider:before {
    position: absolute;
    content: "";
    height: 14px;
    width: 14px;
    left: 3px;
    top: 3px;
    background: white;
    border-radius: 50%;
    transition: .2s;
}

input:checked + .slider {
    background-color: #667eea;
}

input:checked + .slider:before {
    transform: translateX(16px);
}

/* Groups */
.groups {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.group {
    background: #f7f7ff;
    padding: 10px;
    border-radius: 10px;
    min-width: 160px;
    flex: 1;
}

.group li {
    background: white;
    margin: 5px 0;
    padding: 6px;
    border-radius: 5px;
    cursor: grab;
}

/* Fullscreen */
.fullscreen .layout,
.fullscreen textarea,
.fullscreen .controls,
.fullscreen .students {
    display: none;
}

.topbar {
    display: none;
    margin-bottom: 10px;
    gap: 10px;
}

.fullscreen .topbar {
    display: flex;
}
</style>
</head>
<body>

<div class="container" id="app">
<h2>Group Maker</h2>

<div class="layout">
    <div class="left">
        <textarea id="names" placeholder="One name per line"></textarea>

        <div class="controls">
            <label><input type="radio" name="mode" value="size" checked> Group size</label>
            <input type="number" id="groupSize" placeholder="3">

            <label><input type="radio" name="mode" value="count"> # of groups</label>
            <input type="number" id="groupCount" placeholder="5">

            <button onclick="generate()">Generate</button>
        </div>
    </div>

    <div id="studentList" class="students"></div>
</div>

<div class="topbar">
<button onclick="shuffleGroups()">Shuffle</button>
<button onclick="toggleFullscreen()">Exit Full Screen</button>
</div>

<div id="groups" class="groups"></div>

<div style="margin-top:10px;">
<button onclick="toggleFullscreen()">Full Screen</button>
<button onclick="shuffleGroups()">Shuffle</button>
</div>

</div>

<script>
let allStudents = [];
let present = new Set();
let groups = [];

const textarea = document.getElementById("names");
const app = document.getElementById("app");

window.onload = () => {
    const saved = localStorage.getItem("names");
    if (saved) textarea.value = saved;
};

textarea.addEventListener("input", () => {
    localStorage.setItem("names", textarea.value);
});

function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
}

function generate() {
    allStudents = textarea.value.split("\n").map(x => x.trim()).filter(x => x);
    present = new Set(allStudents);
    renderStudentList();
    buildGroups();
}

function renderStudentList() {
    const div = document.getElementById("studentList");
    div.innerHTML = "";

    allStudents.forEach(name => {
        const row = document.createElement("div");
        row.className = "student-row";

        const span = document.createElement("span");
        span.textContent = name;

        const label = document.createElement("label");
        label.className = "switch";

        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = true;

        cb.onchange = () => {
            if (cb.checked) present.add(name);
            else present.delete(name);
            buildGroups();
        };

        const slider = document.createElement("span");
        slider.className = "slider";

        label.appendChild(cb);
        label.appendChild(slider);

        row.appendChild(span);
        row.appendChild(label);

        div.appendChild(row);
    });
}

function buildGroups() {
    let list = Array.from(present);
    shuffle(list);

    const mode = document.querySelector('input[name="mode"]:checked').value;
    groups = [];

    if (mode === "size") {
        const size = parseInt(document.getElementById("groupSize").value) || 1;
        for (let i = 0; i < list.length; i += size) {
            groups.push(list.slice(i, i + size));
        }
    } else {
        const count = parseInt(document.getElementById("groupCount").value) || 1;
        groups = Array.from({length: count}, () => []);
        list.forEach((s, i) => groups[i % count].push(s));
    }

    renderGroups();
}

function renderGroups() {
    const container = document.getElementById("groups");
    container.innerHTML = "";

    groups.forEach((group, gi) => {
        const div = document.createElement("div");
        div.className = "group";

        const title = document.createElement("h4");
        title.textContent = "Group " + (gi + 1);

        const ul = document.createElement("ul");

        ul.ondragover = e => e.preventDefault();
        ul.ondrop = e => {
            e.preventDefault();
            const name = e.dataTransfer.getData("text");
            moveStudent(name, gi);
        };

        group.forEach(name => {
            const li = document.createElement("li");
            li.textContent = name;
            li.draggable = true;

            li.ondragstart = e => {
                e.dataTransfer.setData("text", name);
            };

            ul.appendChild(li);
        });

        div.appendChild(title);
        div.appendChild(ul);
        container.appendChild(div);
    });
}

function moveStudent(name, newGroupIndex) {
    groups.forEach(g => {
        const i = g.indexOf(name);
        if (i !== -1) g.splice(i, 1);
    });
    groups[newGroupIndex].push(name);
    renderGroups();
}

function shuffleGroups() {
    buildGroups();
}

function toggleFullscreen() {
    app.classList.toggle("fullscreen");
}
</script>

</body>
</html>
