<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monster Group Maker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing:border-box; }

body {
    margin:0;
    font-family:"Segoe UI",sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

/* MONSTERS */
.monster {
    position:fixed;
    font-size:26px;
    opacity:0.12;
    pointer-events:none;
}

/* LAYOUT */
.container {
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.grid {
    display:grid;
    grid-template-columns:260px 1fr;
    gap:20px;
}

.card {
    background:white;
    border-radius:16px;
    padding:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

textarea {
    width:100%;
    height:300px;
    border-radius:12px;
    padding:10px;
}

/* STUDENTS */
.students {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.student {
    background:#fff0f5;
    padding:6px 10px;
    border-radius:12px;
    display:flex;
    gap:6px;
    align-items:center;
}

/* BUTTONS */
button {
    background:#ff7eb3;
    border:none;
    color:white;
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
    transition:0.15s;
}
button.active {
    outline:3px solid #ff4d88;
    transform:scale(1.05);
}
button:active {
    transform:scale(0.95);
}

.top-actions {
    position:fixed;
    top:10px;
    right:10px;
    display:flex;
    gap:10px;
}

/* GROUPS */
.groups-card { margin-top:20px; }

.groups {
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.group {
    background:#e6f7ff;
    border-radius:14px;
    padding:15px;
    min-width:200px;
}

/* draggable */
.member {
    padding:4px;
    border-radius:8px;
}
.member.dragging {
    opacity:0.5;
}

/* TABS */
.tabs {
    display:flex;
    gap:10px;
    margin-bottom:10px;
}
.tab {
    padding:6px 10px;
    border-radius:10px;
    background:#eee;
    cursor:pointer;
}
.tab.active { background:#ff7eb3; color:white; }

.hidden { display:none; }

/* FULLSCREEN */
.fullscreen .grid,
.fullscreen .tabs,
.fullscreen .card:not(.groups-card),
.fullscreen h2 {
    display:none;
}
.fullscreen .groups {
    justify-content:center;
    align-items:center;
    height:90vh;
    font-size:2em;
}
</style>
</head>

<body>

<div class="top-actions">
<button onclick="shuffleGroups()">🔀 Shuffle</button>
<button onclick="toggleFullscreen()">🖥 Full Screen</button>
</div>

<div class="container" id="app">

<h2>👾 Monster Group Maker</h2>

<div class="tabs">
<div class="tab active" onclick="showTab(event,'main')">Main</div>
<div class="tab" onclick="showTab(event,'constraints')">Constraints</div>
</div>

<div id="mainTab">

<div class="grid">

<div class="card">
<textarea id="names"></textarea>

<select onchange="loadPreset(this.value)">
<option value="">Load Class</option>
<option value="mcfarlane">Mr. McFarlane Grade 4</option>
</select>

<div style="display:flex;gap:5px;margin-top:10px;">
<button id="modeSize" class="active" onclick="setMode('size')">Size</button>
<button id="modeCount" onclick="setMode('count')">Groups</button>
<input type="number" id="modeValue" value="3" style="width:70px;">
</div>

<button onclick="generate(event)" style="margin-top:10px;width:100%;">Generate</button>
</div>

<div class="card">
<div id="studentList" class="students"></div>
</div>

</div>
</div>

<div id="constraintsTab" class="hidden card">
<h3>Constraints</h3>
<p style="opacity:0.6;">(Hidden from students)</p>
</div>

<div class="groups-card card">
<h3>Groups</h3>
<div id="groups" class="groups"></div>
</div>

</div>

<script>
const monsters=["👾","👻","🐸","🐙","🦄","🐵","👹","🐱","🐼","🐰","🐯","🐨","🐮","🐷","🐧","🦊","🐻","🐔","🐢","🐍","🦖","🐲","🦕","🐺","🦁","🐗","🐬","🦈","🐝","🐞"];

let mode="size";
let allStudents=[], present=new Set(), groups=[];
let dragItem=null, selected=null;

/* bouncing monsters */
function spawnMonsters(){
for(let i=0;i<12;i++){
let m=document.createElement("div");
m.className="monster";
m.textContent=monsters[Math.floor(Math.random()*monsters.length)];
m.x=Math.random()*window.innerWidth;
m.y=Math.random()*window.innerHeight;
m.dx=1+Math.random();
m.dy=1+Math.random();
document.body.appendChild(m);

function move(){
m.x+=m.dx;
m.y+=m.dy;
if(m.x<0||m.x>window.innerWidth-30) m.dx*=-1;
if(m.y<0||m.y>window.innerHeight-30) m.dy*=-1;
m.style.left=m.x+"px";
m.style.top=m.y+"px";
requestAnimationFrame(move);
}
move();
}
}
spawnMonsters();

/* UI */
function showTab(e,t){
mainTab.classList.toggle("hidden",t!=="main");
constraintsTab.classList.toggle("hidden",t!=="constraints");
document.querySelectorAll(".tab").forEach(el=>el.classList.remove("active"));
e.target.classList.add("active");
}

function setMode(m){
mode=m;
modeSize.classList.toggle("active",m==="size");
modeCount.classList.toggle("active",m==="count");
modeValue.value = (m==="size")?3:6;
}

function loadPreset(v){
if(v==="mcfarlane"){
names.value=`Adam
Alec
Aliyah
Alyssa
Anika
Anna
Ayden
Clyde
Émylie-Maude
Jonathan
Joshua
Julian
Junior
Maejor
Max
Niaganii
Phoenix
Samuel`;
}
}

/* generate */
function generate(e){
let btn=e.target;
btn.textContent="Generating...";

setTimeout(()=>{
allStudents=names.value.split("\n").map(x=>x.trim()).filter(x=>x);
present=new Set(allStudents);
renderStudents();
buildGroups();
btn.textContent="Generate";
},150);
}

/* students */
function renderStudents(){
studentList.innerHTML="";
allStudents.forEach(n=>{
let d=document.createElement("div");
d.className="student";
d.innerHTML=`${getMonster(n)} ${n} <input type="checkbox" checked>`;
d.querySelector("input").onchange=e=>{
e.target.checked?present.add(n):present.delete(n);
buildGroups();
};
studentList.appendChild(d);
});
}

/* groups */
function buildGroups(){
let list=[...present];
list.sort(()=>Math.random()-0.5);

let value=parseInt(modeValue.value)||3;
groups=[];

if(mode==="size"){
for(let i=0;i<list.length;i+=value){
groups.push(list.slice(i,i+value));
}
}else{
let count=value;
groups=Array.from({length:count},()=>[]);
list.forEach((n,i)=>groups[i%count].push(n));
}

renderGroups();
}

function renderGroups(){
groupsEl.innerHTML="";

groups.forEach((g,i)=>{
let d=document.createElement("div");
d.className="group";

d.innerHTML="<h4>Group "+(i+1)+"</h4>";

d.ondragover=e=>e.preventDefault();
d.ondrop=()=>{
if(dragItem){
groups.forEach(gr=>{
let idx=gr.indexOf(dragItem);
if(idx>-1) gr.splice(idx,1);
});
g.push(dragItem);
renderGroups();
}
};

g.forEach(n=>{
let el=document.createElement("div");
el.className="member";
el.draggable=true;
el.textContent=getMonster(n)+" "+n;

el.ondragstart=()=>{
dragItem=n;
el.classList.add("dragging");
};

el.ondragend=()=>{
dragItem=null;
el.classList.remove("dragging");
};

/* TOUCH SUPPORT */
el.onclick=()=>{
if(!selected){
selected=n;
el.style.outline="2px solid red";
}else{
groups.forEach(gr=>{
let idx=gr.indexOf(selected);
if(idx>-1) gr.splice(idx,1);
});
g.push(selected);
selected=null;
renderGroups();
}
};

d.appendChild(el);
});

groupsEl.appendChild(d);
});
}

function getMonster(n){
return monsters[[...n].reduce((a,c)=>a+c.charCodeAt(0),0)%monsters.length];
}

function shuffleGroups(){ buildGroups(); }
function toggleFullscreen(){ app.classList.toggle("fullscreen"); }
</script>

</body>
</html>
