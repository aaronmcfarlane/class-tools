<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monster Group Maker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin: 0;
    font-family: "Comic Sans MS", "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

/* floating monster background */
body::before {
    content: "👾 👻 🐸 🐙 🦄 🐵 👹 🐱 🐼 🐰";
    position: fixed;
    font-size: 40px;
    opacity: 0.08;
    top: 0;
    left: 0;
    width: 200%;
    height: 200%;
    animation: float 60s linear infinite;
}

@keyframes float {
    from { transform: translate(0,0); }
    to { transform: translate(-50%, -50%); }
}

.container {
    background: white;
    border-radius: 20px;
    padding: 20px;
    margin: 20px auto;
    max-width: 1100px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    font-size: 28px;
}

.layout {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

/* LEFT PANEL */
.left {
    flex: 0 0 250px;
}

textarea {
    width: 100%;
    height: 420px;
    border-radius: 15px;
    border: 2px dashed #ffb6b9;
    padding: 10px;
    font-size: 14px;
}

/* controls */
.controls {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

button {
    background: #ff7eb3;
    border: none;
    color: white;
    padding: 10px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
}

button:hover {
    background: #ff5c9c;
}

/* STUDENT MONSTERS */
.students {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-content: flex-start;
}

.student {
    background: #fff5f7;
    border-radius: 14px;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    border: 2px solid transparent;
}

.student.off {
    opacity: 0.4;
}

.monster {
    font-size: 20px;
}

.student input {
    transform: scale(1.2);
}

/* GROUPS */
.groups {
    margin-top: 20px;
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.group {
    background: #f0f9ff;
    border-radius: 16px;
    padding: 10px;
    flex: 1;
    min-width: 160px;
    border: 3px solid #a0e7e5;
}

.group h4 {
    margin: 0 0 6px 0;
}

.group li {
    list-style: none;
    background: white;
    margin: 5px 0;
    padding: 6px;
    border-radius: 8px;
    cursor: grab;
    display: flex;
    align-items: center;
    gap: 6px;
}

/* FULLSCREEN */
.fullscreen .layout,
.fullscreen textarea,
.fullscreen .controls,
.fullscreen .students {
    display: none;
}

.topbar {
    display: none;
    gap: 10px;
    margin-bottom: 10px;
}

.fullscreen .topbar {
    display: flex;
    justify-content: center;
}
</style>
</head>
<body>

<div class="container" id="app">
<h2>👾 Monster Group Maker 👾</h2>

<div class="layout">
    <div class="left">
        <textarea id="names" placeholder="One name per line"></textarea>

        <div class="controls">
            <label><input type="radio" name="mode" value="size" checked> Group size</label>
            <input type="number" id="groupSize" placeholder="3">

            <label><input type="radio" name="mode" value="count"> # of groups</label>
            <input type="number" id="groupCount" placeholder="5">

            <button onclick="generate()">Generate</button>
        </div>
    </div>

    <div id="studentList" class="students"></div>
</div>

<div class="topbar">
<button onclick="shuffleGroups()">🔀 Shuffle</button>
<button onclick="toggleFullscreen()">🖥 Exit</button>
</div>

<div id="groups" class="groups"></div>

<div style="margin-top:10px; text-align:center;">
<button onclick="toggleFullscreen()">🖥 Full Screen</button>
<button onclick="shuffleGroups()">🔀 Shuffle</button>
</div>

</div>

<script>
let allStudents = [];
let present = new Set();
let groups = [];
const monsters = ["👾","👻","🐸","🐙","🦄","🐵","👹","🐱","🐼","🐰"];

const textarea = document.getElementById("names");
const app = document.getElementById("app");

window.onload = () => {
    const saved = localStorage.getItem("names");
    if (saved) textarea.value = saved;
};

textarea.addEventListener("input", () => {
    localStorage.setItem("names", textarea.value);
});

function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
}

function getMonster(name) {
    let sum = 0;
    for (let c of name) sum += c.charCodeAt(0);
    return monsters[sum % monsters.length];
}

function generate() {
    allStudents = textarea.value.split("\n").map(x => x.trim()).filter(x => x);
    present = new Set(allStudents);
    renderStudentList();
    buildGroups();
}

function renderStudentList() {
    const div = document.getElementById("studentList");
    div.innerHTML = "";

    allStudents.forEach(name => {
        const el = document.createElement("div");
        el.className = "student";

        const monster = document.createElement("span");
        monster.className = "monster";
        monster.textContent = getMonster(name);

        const label = document.createElement("span");
        label.textContent = name;

        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = true;

        cb.onchange = () => {
            if (cb.checked) {
                present.add(name);
                el.classList.remove("off");
            } else {
                present.delete(name);
                el.classList.add("off");
            }
            buildGroups();
        };

        el.appendChild(monster);
        el.appendChild(label);
        el.appendChild(cb);

        div.appendChild(el);
    });
}

function buildGroups() {
    let list = Array.from(present);
    shuffle(list);

    const mode = document.querySelector('input[name="mode"]:checked').value;
    groups = [];

    if (mode === "size") {
        const size = parseInt(document.getElementById("groupSize").value) || 1;
        for (let i = 0; i < list.length; i += size) {
            groups.push(list.slice(i, i + size));
        }
    } else {
        const count = parseInt(document.getElementById("groupCount").value) || 1;
        groups = Array.from({length: count}, () => []);
        list.forEach((s, i) => groups[i % count].push(s));
    }

    renderGroups();
}

function renderGroups() {
    const container = document.getElementById("groups");
    container.innerHTML = "";

    groups.forEach((group, gi) => {
        const div = document.createElement("div");
        div.className = "group";

        const title = document.createElement("h4");
        title.textContent = "Group " + (gi + 1);

        const ul = document.createElement("ul");

        ul.ondragover = e => e.preventDefault();
        ul.ondrop = e => {
            e.preventDefault();
            const name = e.dataTransfer.getData("text");
            moveStudent(name, gi);
        };

        group.forEach(name => {
            const li = document.createElement("li");
            li.draggable = true;

            li.ondragstart = e => {
                e.dataTransfer.setData("text", name);
            };

            li.textContent = getMonster(name) + " " + name;
            ul.appendChild(li);
        });

        div.appendChild(title);
        div.appendChild(ul);
        container.appendChild(div);
    });
}

function moveStudent(name, newGroupIndex) {
    groups.forEach(g => {
        const i = g.indexOf(name);
        if (i !== -1) g.splice(i, 1);
    });
    groups[newGroupIndex].push(name);
    renderGroups();
}

function shuffleGroups() {
    buildGroups();
}

function toggleFullscreen() {
    app.classList.toggle("fullscreen");
}
</script>

</body>
</html>
