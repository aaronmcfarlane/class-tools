<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monster Group Maker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin: 0;
    font-family: "Comic Sans MS", "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}
body::before {
    content: "👾 👻 🐸 🐙 🦄 🐵 👹 🐱 🐼 🐰 🐯 🐨 🐮 🐷 🐧 🦊 🐻 🐔 🐢 🐍 🦖 🐲 🦕 🐺 🦁 🐗 🐙 🐬 🦈 🐝";
    position: fixed;
    font-size: 40px;
    opacity: 0.08;
    width: 300%;
    height: 300%;
    animation: float 120s linear infinite;
    pointer-events: none;
}
@keyframes float {
    0% { transform: translate(0,0); }
    100% { transform: translate(-30%, -30%); }
}
.container {
    background: white;
    border-radius: 20px;
    padding: 20px;
    margin: 20px auto;
    max-width: 1200px;
}
.top-actions {
    position: fixed;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 10px;
}
button {
    background: #ff7eb3;
    border: none;
    color: white;
    padding: 10px;
    border-radius: 12px;
    cursor: pointer;
}
.layout { display:flex; gap:20px; flex-wrap:wrap; }
.left { width:260px; }
textarea {
    width:100%;
    height:420px;
    border-radius:15px;
    border:2px dashed #ffb6b9;
    padding:10px;
}
.mode-toggle { display:flex; gap:6px; margin:10px 0; }
.mode-toggle button { flex:1; }
.mode-toggle .active { background:#ff5c9c; }
.students { flex:1; display:flex; flex-wrap:wrap; gap:8px; }
.student {
    background:#fff5f7;
    padding:6px 10px;
    border-radius:12px;
    display:flex;
    gap:6px;
    align-items:center;
}
.student.off { opacity:0.4; }
.groups { margin-top:20px; display:flex; flex-wrap:wrap; gap:15px; }
.group {
    background:#f0f9ff;
    border-radius:16px;
    padding:10px;
    flex:1;
    min-width:180px;
}
.fullscreen { font-size:1.6em; }
.fullscreen .layout, .fullscreen textarea { display:none; }
</style>
</head>
<body>

<div class="top-actions">
<button onclick="toggleFullscreen()">🖥</button>
<button onclick="shuffleGroups()">🔀</button>
</div>

<div class="container" id="app">
<h2>👾 Monster Group Maker 👾</h2>

<select onchange="loadPreset(this.value)">
<option value="">Load Class List</option>
<option value="mcfarlane">Mr. McFarlane Grade 4</option>
</select>

<div class="layout">
<div class="left">
<textarea id="names"></textarea>

<div class="mode-toggle">
<button id="modeSize" class="active" onclick="setMode('size')">Size</button>
<button id="modeCount" onclick="setMode('count')">Groups</button>
</div>

<input type="number" id="modeValue" value="3">

<button onclick="generate()">Generate</button>
</div>

<div id="studentList" class="students"></div>
</div>

<h3>🚫 Do Not Pair</h3>
<div id="avoidList"></div>

<h3>❤️ Must Pair</h3>
<div id="mustList"></div>

<div id="groups" class="groups"></div>

<div style="text-align:center;margin-top:10px;">
<button onclick="toggleFullscreen()">Full Screen</button>
<button onclick="shuffleGroups()">Shuffle</button>
</div>

</div>

<script>
const monsters=["👾","👻","🐸","🐙","🦄","🐵","👹","🐱","🐼","🐰","🐯","🐨","🐮","🐷","🐧","🦊","🐻","🐔","🐢","🐍","🦖","🐲","🦕","🐺","🦁","🐗","🐬","🦈","🐝","🐞"];

let mode="size";
let allStudents=[], present=new Set(), groups=[];
let avoidPairs=[], mustPairs=[];

function setMode(m){
mode=m;
modeSize.classList.toggle("active",m==="size");
modeCount.classList.toggle("active",m==="count");
modeValue.value = m==="size"?3:6;
buildGroups();
}

function getMonster(n){
return monsters[[...n].reduce((a,c)=>a+c.charCodeAt(0),0)%monsters.length];
}

function loadPreset(v){
if(v==="mcfarlane"){
names.value=`Adam
Alec
Aliyah
Alyssa
Anika
Anna
Ayden
Clyde
Émylie-Maude
Jonathan
Joshua
Julian
Junior
Maejor
Max
Niaganii
Phoenix
Samuel`;
}
}

function generate(){
allStudents=names.value.split("\n").map(x=>x.trim()).filter(x=>x);
present=new Set(allStudents);
renderStudents();
renderConstraints();
buildGroups();
}

function renderStudents(){
studentList.innerHTML="";
allStudents.forEach(n=>{
let d=document.createElement("div");
d.className="student";
d.innerHTML=`${getMonster(n)} ${n} <input type="checkbox" checked>`;
d.querySelector("input").onchange=e=>{
e.target.checked?present.add(n):present.delete(n);
buildGroups();
};
studentList.appendChild(d);
});
}

function renderConstraints(){
avoidList.innerHTML="";
mustList.innerHTML="";
avoidPairs=[]; mustPairs=[];

allStudents.forEach((a,i)=>{
for(let j=i+1;j<allStudents.length;j++){
let b=allStudents[j];

let cb1=document.createElement("input");
cb1.type="checkbox";
cb1.onchange=e=>{
if(e.target.checked) avoidPairs.push([a,b]);
else avoidPairs=avoidPairs.filter(p=>!(p[0]===a&&p[1]===b));
buildGroups();
};

let cb2=document.createElement("input");
cb2.type="checkbox";
cb2.onchange=e=>{
if(e.target.checked) mustPairs.push([a,b]);
else mustPairs=mustPairs.filter(p=>!(p[0]===a&&p[1]===b));
buildGroups();
};

avoidList.append(`${a}-${b} `,cb1,document.createElement("br"));
mustList.append(`${a}-${b} `,cb2,document.createElement("br"));
}
});
}

/* SMART SOLVER */
function violates(group, student){
return avoidPairs.some(([a,b]) =>
(group.includes(a)&&student===b)||(group.includes(b)&&student===a)
);
}

function satisfiesMust(groups){
return mustPairs.every(([a,b]) =>
groups.some(g=>g.includes(a)&&g.includes(b))
);
}

function backtrack(list, groups, sizes){
if(list.length===0){
return satisfiesMust(groups) ? groups : null;
}

let student=list[0];
for(let i=0;i<groups.length;i++){
if(groups[i].length>=sizes[i]) continue;
if(violates(groups[i], student)) continue;

groups[i].push(student);
let res=backtrack(list.slice(1), groups, sizes);
if(res) return res;
groups[i].pop();
}
return null;
}

function buildGroups(){
let list=[...present];
list.sort(()=>Math.random()-0.5);

let sizes=[];
if(mode==="size"){
let s=parseInt(modeValue.value)||1;
for(let i=0;i<Math.ceil(list.length/s);i++) sizes.push(s);
}else{
let c=parseInt(modeValue.value)||1;
sizes=Array(c).fill(Math.ceil(list.length/c));
}

let attempt=0, solution=null;
while(attempt<20 && !solution){
attempt++;
let gs=sizes.map(()=>[]);
solution=backtrack(list, gs, sizes);
}

groups=solution || sizes.map(()=>[]);
if(!solution) console.warn("No perfect solution found");

renderGroups();
}

function renderGroups(){
groupsEl.innerHTML="";
groups.forEach((g,i)=>{
let d=document.createElement("div");
d.className="group";
d.innerHTML="<h4>Group "+(i+1)+"</h4>";
g.forEach(n=>{
let li=document.createElement("div");
li.textContent=getMonster(n)+" "+n;
li.onclick=()=>moveTap(n,i);
d.appendChild(li);
});
groupsEl.appendChild(d);
});
}

let selected=null;
function moveTap(n,i){
if(!selected){selected=n;return;}
groups.forEach(g=>{let idx=g.indexOf(selected);if(idx>-1)g.splice(idx,1);});
groups[i].push(selected);
selected=null;
renderGroups();
}

function shuffleGroups(){buildGroups();}
function toggleFullscreen(){app.classList.toggle("fullscreen");}
</script>

</body>
</html>
