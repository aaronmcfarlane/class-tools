/* fallback mixing */

function getSet(){
if(grade<=2)return data[1]
if(grade<=4)return data[3]
return data[6]
}

/* GENERATION */

let used=new Set()
let lastProblem=null

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function generateCards(){

let set=getSet()

let s,p,key

do{
s=rand(set.settings[lang])
p=rand(set.problems[lang])
key=s+"|"+p
}
while(used.has(key)||p===lastProblem)

used.add(key)
lastProblem=p

settingCard.textContent=s
problemCard.textContent=p

}

/* GROUP MODE */

function generateGroups(){

let set=getSet()
const count=parseInt(groupCount.value)
const grid=document.getElementById("groupGrid")

grid.innerHTML=""

for(let i=1;i<=count;i++){

let s=rand(set.settings[lang])
let p=rand(set.problems[lang])

const div=document.createElement("div")
div.className="groupCard"

div.innerHTML=`<b>${lang==="en"?"Group":"Groupe"} ${i}</b><br><br>
<b>${lang==="en"?"Setting":"Lieu"}:</b> ${s}<br>
<b>${lang==="en"?"Problem":"Problème"}:</b> ${p}`

grid.appendChild(div)

}

}

/* UI TEXT */

function updateUI(){

if(lang==="en"){
title.textContent="Drama Scenario Generator"
subtitle.textContent=""
generateBtn.textContent="Generate Scenario"
settingLabel.textContent="SETTING"
problemLabel.textContent="CONFLICT"
groupLabel.textContent="Groups:"
groupBtn.textContent="Generate"
}else{
title.textContent="Générateur de scénarios dramatiques"

generateBtn.textContent="Générer"
settingLabel.textContent="LIEU"
problemLabel.textContent="PROBLÈME"
groupLabel.textContent="Groupes:"
groupBtn.textContent="Générer"
}

}

/* FULLSCREEN BIG MODE */

function toggleFullscreen(){

if(!document.fullscreenElement){
document.documentElement.requestFullscreen()
document.body.classList.add("big")
}
else{
document.exitFullscreen()
document.body.classList.remove("big")
}

}
