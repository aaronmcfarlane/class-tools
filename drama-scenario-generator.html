<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎭 Drama Scenario Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red:       #c94040;
  --red-light: #fdeaea;
  --red-dark:  #a02e2e;
  --gold:      #d4a843;
  --gold-light:#fdf5e0;
  --teal:      #3a9e8f;
  --teal-light:#e0f5f2;
  --blue:      #4a7fc1;
  --blue-light:#e6eefa;
  --purple:    #8056c7;
  --purple-light:#f0eaff;
  --green:     #4a9e6a;
  --green-light:#e4f5ec;
  --bg:        #f7f2ee;
  --card:      #ffffff;
  --text:      #2a2420;
  --muted:     #9e8e80;
  --radius:    18px;
  --shadow:    0 4px 20px rgba(100,40,40,0.10);
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  background: white;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 12px rgba(100,40,40,0.10);
  position: sticky;
  top: 0;
  z-index: 100;
}

header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.35rem;
  font-weight: 900;
  color: var(--red);
  letter-spacing: -0.5px;
}

.header-actions { display: flex; gap: 8px; align-items: center; }

/* ── LAYOUT ── */
.app {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 20px;
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 20px;
  align-items: start;
}

.sidebar { display: flex; flex-direction: column; gap: 16px; }
.main-content { display: flex; flex-direction: column; gap: 16px; }

/* ── CARDS ── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: var(--shadow);
}

.card-title {
  font-size: 0.75rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--muted);
  margin-bottom: 12px;
}

/* ── BUTTONS ── */
button {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.88rem;
  border: none;
  border-radius: 10px;
  padding: 8px 14px;
  cursor: pointer;
  transition: transform 0.12s, opacity 0.15s, background 0.15s;
}
button:active { transform: scale(0.95); }

.btn-primary {
  background: var(--red);
  color: white;
  width: 100%;
  padding: 11px;
  font-size: 1rem;
  font-weight: 800;
  border-radius: 12px;
}
.btn-primary:hover { background: var(--red-dark); }

.btn-ghost {
  background: transparent;
  color: var(--muted);
  padding: 6px 12px;
  font-size: 0.82rem;
  border: 2px solid #e8e0d8;
}
.btn-ghost:hover { border-color: var(--red); color: var(--red); }

.btn-ghost.active {
  background: var(--red-light);
  border-color: var(--red);
  color: var(--red);
}

.btn-mode {
  background: #f0ebe6;
  color: var(--muted);
  flex: 1;
  font-weight: 700;
}
.btn-mode.active { background: var(--gold); color: white; }

/* ── SELECT / INPUT ── */
select, input[type="number"] {
  font-family: 'Nunito', sans-serif;
  font-size: 0.9rem;
  border: 2px solid #e8e0d8;
  border-radius: 10px;
  padding: 7px 10px;
  outline: none;
  background: white;
  color: var(--text);
  transition: border 0.2s;
}
select:focus, input:focus { border-color: var(--red); }

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 6px;
  background: #ede7e1;
  padding: 5px;
  border-radius: 12px;
}
.tab {
  flex: 1;
  text-align: center;
  padding: 7px 10px;
  border-radius: 9px;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.18s;
}
.tab.active {
  background: white;
  color: var(--red);
  box-shadow: 0 2px 8px rgba(100,40,40,0.12);
}

/* ── SCENARIO DISPLAY (carousel mode) ── */
.scenario-display {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.scenario-block {
  border-radius: 14px;
  padding: 22px 24px;
  position: relative;
  overflow: hidden;
}
.scenario-block.setting-block {
  background: var(--gold-light);
  border-left: 5px solid var(--gold);
}
.scenario-block.conflict-block {
  background: var(--red-light);
  border-left: 5px solid var(--red);
}

.scenario-label {
  font-size: 0.7rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 6px;
}
.scenario-value {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 700;
  line-height: 1.2;
  color: var(--text);
  min-height: 1.4em;
  transition: opacity 0.2s;
}

/* ── GROUP CARDS ── */
.groups-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
}

.group-card {
  border-radius: 16px;
  padding: 16px 18px;
  min-width: 200px;
  flex: 1;
  max-width: 260px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  animation: popIn 0.22s ease both;
}
.group-card:hover { transform: scale(1.03); box-shadow: 0 8px 24px rgba(0,0,0,0.13); }

.group-card:nth-child(6n+1) { background: var(--red-light);    border-top: 4px solid var(--red); }
.group-card:nth-child(6n+2) { background: var(--gold-light);   border-top: 4px solid var(--gold); }
.group-card:nth-child(6n+3) { background: var(--teal-light);   border-top: 4px solid var(--teal); }
.group-card:nth-child(6n+4) { background: var(--blue-light);   border-top: 4px solid var(--blue); }
.group-card:nth-child(6n+5) { background: var(--purple-light); border-top: 4px solid var(--purple); }
.group-card:nth-child(6n+6) { background: var(--green-light);  border-top: 4px solid var(--green); }

.group-card h4 {
  font-size: 0.72rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 10px;
}

.group-setting {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-weight: 700;
  margin-bottom: 5px;
  color: var(--text);
}
.group-conflict {
  font-size: 0.85rem;
  font-weight: 600;
  color: #5a4a40;
  line-height: 1.35;
}
.group-hint {
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 10px;
  font-style: italic;
}

.groups-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.groups-header h2 { font-size: 1rem; font-weight: 900; }

.mode-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 10px;
}
.mode-row input[type="number"] { width: 70px; text-align: center; }

.empty-state {
  color: var(--muted);
  font-size: 0.95rem;
  text-align: center;
  padding: 30px;
}

/* ── FULLSCREEN TOOLBAR ── */
#fullscreenToolbar {
  display: none;
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  background: rgba(160,46,46,0.92);
  backdrop-filter: blur(6px);
  border-radius: 14px;
  padding: 8px 12px;
  gap: 10px;
  align-items: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}
#fullscreenToolbar button {
  background: rgba(255,255,255,0.2);
  color: white;
  font-weight: 800;
  font-size: 0.88rem;
  border-radius: 10px;
  padding: 8px 14px;
}
#fullscreenToolbar button:hover { background: rgba(255,255,255,0.35); }

/* ── FULLSCREEN ── */
body.fullscreen {
  overflow: hidden;
}
body.fullscreen header,
body.fullscreen .sidebar {
  display: none;
}
body.fullscreen #fullscreenToolbar { display: flex; }
body.fullscreen .app {
  grid-template-columns: 1fr;
  max-width: 100%;
  padding: 20px 20px 70px 20px;
  height: 100vh;
  align-items: stretch;
}
body.fullscreen .main-content {
  height: calc(100vh - 110px);
  display: flex;
  flex-direction: column;
}

/* Carousel fullscreen */
body.fullscreen #carouselView {
  flex: 1;
  display: flex;
  flex-direction: column;
}
body.fullscreen #carouselView .card {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 20px;
}
body.fullscreen .scenario-value {
  font-size: clamp(2rem, 5vw, 4.5rem);
}

/* Groups fullscreen */
body.fullscreen .groups-outer {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
body.fullscreen .groups-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
body.fullscreen .groups-grid {
  flex: 1;
  display: grid;
  gap: 14px;
  align-content: start;
  /* grid-template-columns set by JS based on group count */
}
body.fullscreen .group-card {
  min-width: 0;
  max-width: none;
  width: 100%;
  flex: none;
}

/* ── HIDDEN ── */
.hidden { display: none !important; }

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  .app { grid-template-columns: 1fr; }
}

/* ── ANIMATIONS ── */
@keyframes popIn {
  from { transform: scale(0.88); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.scenario-value.animate { animation: fadeSlide 0.25s ease both; }

/* ── FLOATING CURTAINS / DRAMA DECO ── */
.deco {
  position: fixed;
  font-size: 26px;
  opacity: 0.10;
  pointer-events: none;
  z-index: 0;
  user-select: none;
}
</style>
</head>
<body>

<!-- Fullscreen toolbar (shown only in fullscreen) -->
<div id="fullscreenToolbar">
  <button id="fsGenScenario" onclick="generateScenario()">🎲 New Scenario</button>
  <button id="fsReshuffle" onclick="generateGroups()" class="hidden">🔀 Re-shuffle Groups</button>
  <button onclick="toggleFullscreen()">✕ Exit Fullscreen</button>
</div>

<header>
  <h1>🎭 Drama Scenario Generator</h1>
  <div class="header-actions">
    <button class="btn-ghost" id="langBtn" onclick="toggleLanguage()">EN / FR</button>
    <button class="btn-ghost" onclick="toggleFullscreen()">🖥 Fullscreen</button>
  </div>
</header>

<div class="app" id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="tabs">
      <div class="tab active" onclick="showTab(event,'carousel')">Scenario</div>
      <div class="tab" onclick="showTab(event,'groups')">Groups</div>
    </div>

    <!-- CAROUSEL CONTROLS -->
    <div id="carouselControls">
      <div class="card">
        <div class="card-title">Grade</div>
        <select id="gradeSelect" onchange="updateGrade()" style="width:100%;">
          <option value="1">Grade 1</option>
          <option value="2">Grade 2</option>
          <option value="3">Grade 3</option>
          <option value="4" selected>Grade 4</option>
          <option value="5">Grade 5</option>
          <option value="6">Grade 6</option>
        </select>
        <button class="btn-primary" style="margin-top:12px;" onclick="generateScenario()">🎲 Generate Scenario</button>
      </div>
    </div>

    <!-- GROUPS CONTROLS -->
    <div id="groupsControls" class="hidden">
      <div class="card">
        <div class="card-title">Grade</div>
        <select id="gradeSelectGroups" onchange="updateGradeGroups()" style="width:100%;">
          <option value="1">Grade 1</option>
          <option value="2">Grade 2</option>
          <option value="3">Grade 3</option>
          <option value="4" selected>Grade 4</option>
          <option value="5">Grade 5</option>
          <option value="6">Grade 6</option>
        </select>
        <div class="card-title" style="margin-top:14px;">Number of Groups</div>
        <input type="number" id="groupCount" value="4" min="1" max="20" style="width:100%;">
        <button class="btn-primary" style="margin-top:12px;" onclick="generateGroups()">🎲 Generate Groups</button>
      </div>
    </div>

  </aside>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <!-- CAROUSEL VIEW -->
    <div id="carouselView">
      <div class="card scenario-display">
        <div class="scenario-block setting-block">
          <div class="scenario-label" id="settingLabel">Setting</div>
          <div class="scenario-value" id="settingCard">—</div>
        </div>
        <div class="scenario-block conflict-block">
          <div class="scenario-label" id="conflictLabel">Conflict</div>
          <div class="scenario-value" id="conflictCard">—</div>
        </div>
      </div>
    </div>

    <!-- GROUPS VIEW -->
    <div id="groupsView" class="hidden groups-outer">
      <div class="card groups-card">
        <div class="groups-header">
          <h2 id="groupsTitle">Groups</h2>
          <button class="btn-ghost" onclick="generateGroups()" style="font-size:0.82rem;">🔀 Re-shuffle</button>
        </div>
        <div id="groupGrid" class="groups-grid">
          <div class="empty-state">Generate groups to see them here 👆</div>
        </div>
      </div>
    </div>

  </div>
</div>

/* ── TABS ── */
function showTab(e, t) {

  document.getElementById("carouselControls").classList.toggle("hidden", t !== "carousel");

  document.querySelectorAll(".tab").forEach(el => el.classList.remove("active"));
  e.target.classList.add("active");
  // Sync fullscreen toolbar
  document.getElementById("fsGenScenario").classList.toggle("hidden", t !== "carousel");
  document.getElementById("fsReshuffle").classList.toggle("hidden", t !== "groups");
}

/* ── CAROUSEL ── */
function generateScenario() {
  const set = getSet();
  let s, p, key, attempts = 0;
  do {
    s = rand(set.settings[lang]);
    p = rand(set.problems[lang]);
    key = s + "|" + p;
    attempts++;
    if (attempts > 60) { used.clear(); lastProblem = null; }
  } while (used.has(key) || p === lastProblem);

  used.add(key);
  lastProblem = p;

  const settingEl = document.getElementById("settingCard");
  const conflictEl = document.getElementById("conflictCard");
  settingEl.classList.remove("animate");
  conflictEl.classList.remove("animate");
  void settingEl.offsetWidth;
  settingEl.textContent = s;
  conflictEl.textContent = p;
  settingEl.classList.add("animate");
  conflictEl.classList.add("animate");
}

/* ── GROUPS ── */
function generateGroups() {
  const set = getSet();
  const count = parseInt(document.getElementById("groupCount").value) || 4;
  const grid = document.getElementById("groupGrid");
  grid.innerHTML = "";
  currentGroupScenarios = [];
  const localUsed = new Set();

  for (let i = 0; i < count; i++) {
    let s, p, key, attempts = 0;
    do {
      s = rand(set.settings[lang]);
      p = rand(set.problems[lang]);
      key = s + "|" + p;
      attempts++;
      if (attempts > 60) localUsed.clear();
    } while (localUsed.has(key));
    localUsed.add(key);
    currentGroupScenarios.push({ s, p });
  }

  currentGroupScenarios.forEach((_, i) => createGroupCard(i));
  applyFullscreenFontSize();
}

function createGroupCard(i) {
  const item = currentGroupScenarios[i];
  const grid = document.getElementById("groupGrid");
  const div = document.createElement("div");
  div.className = "group-card";
  div.style.animationDelay = `${i * 0.05}s`;
  div.title = lang === "en" ? "Click to regenerate this group" : "Cliquer pour regénérer ce groupe";
  div.innerHTML = `
    <h4>${lang === "en" ? "Group" : "Groupe"} ${i + 1}</h4>
    <div class="group-setting">📍 ${item.s}</div>
    <div class="group-conflict">⚡ ${item.p}</div>
    <div class="group-hint">${lang === "en" ? "Click to regenerate" : "Cliquer pour regénérer"}</div>`;
  div.onclick = () => regenerateSingleGroup(i);
  grid.appendChild(div);
}

function regenerateSingleGroup(index) {
  const set = getSet();
  const localUsed = new Set(
    currentGroupScenarios.map((x, i) => i !== index ? x.s + "|" + x.p : null).filter(Boolean)
  );
  let s, p, key, attempts = 0;
  do {
    s = rand(set.settings[lang]);
    p = rand(set.problems[lang]);
    key = s + "|" + p;
    attempts++;
    if (attempts > 60) break;
  } while (localUsed.has(key));
  currentGroupScenarios[index] = { s, p };
  document.getElementById("groupGrid").innerHTML = "";
  currentGroupScenarios.forEach((_, i) => createGroupCard(i));
  applyFullscreenFontSize();
}

/* ── LANGUAGE ── */
function toggleLanguage() {
  lang = lang === "en" ? "fr" : "en";
  used.clear();
  lastProblem = null;
  updateLabels();
  generateScenario();
  if (currentGroupScenarios.length) generateGroups();
}

function updateLabels() {
  const isEn = lang === "en";
  document.getElementById("settingLabel").textContent  = isEn ? "Setting"  : "Lieu";
  document.getElementById("conflictLabel").textContent = isEn ? "Conflict" : "Problème";
  document.getElementById("groupsTitle").textContent   = isEn ? "Groups"   : "Groupes";
}

/* ── GRADE ── */
function updateGrade() {
  grade = parseInt(document.getElementById("gradeSelect").value);
  document.getElementById("gradeSelectGroups").value = grade;
  used.clear(); lastProblem = null;
  generateScenario();
}
function updateGradeGroups() {
  grade = parseInt(document.getElementById("gradeSelectGroups").value);
  document.getElementById("gradeSelect").value = grade;
  used.clear(); lastProblem = null;
  if (currentGroupScenarios.length) generateGroups();
}

/* ── FULLSCREEN ── */
function toggleFullscreen() {
  document.body.classList.toggle("fullscreen");
  applyFullscreenFontSize();
}

function applyFullscreenFontSize() {
  const grid = document.getElementById("groupGrid");
  grid.style.fontSize = "";
  grid.style.gridTemplateColumns = "";

  if (!document.body.classList.contains("fullscreen") || currentGroupScenarios.length === 0) return;

  const n = currentGroupScenarios.length;

  // Pick number of columns: try to keep rows balanced
  // e.g. 4 groups → 4 cols, 6 groups → 3 cols (2 rows), 8 → 4 cols (2 rows)
  let cols = n;
  if (n > 6) cols = Math.ceil(n / 2);
  else if (n > 8) cols = Math.ceil(n / 3);

  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  const rows = Math.ceil(n / cols);
  const availableH = window.innerHeight - 20 - 70 - 60; // padding + toolbar + card header

  // Binary search for largest font that fits within available height
  let lo = 10, hi = 60, best = 14;
  for (let iter = 0; iter < 14; iter++) {
    const mid = (lo + hi) / 2;
    const rowH = mid * 2.4;
    const cardH = mid * 1.5 + 3 * rowH + 24; // label + 3 content rows + padding
    const totalH = rows * cardH + (rows - 1) * 14; // cards + gaps
    if (totalH <= availableH) { best = mid; lo = mid; }
    else hi = mid;
  }

  grid.style.fontSize = best + "px";
}

window.addEventListener("resize", applyFullscreenFontSize);

/* ── FLOATING DECO ── */
(function () {
  const icons = ["🎭","🎬","🎪","🎨","🪄","🎤","🎶","🎺","🎸","🪗","🎻","🎩","🪅","🌟","✨","🎯","🎲","🃏","🎠","🎡"];
  for (let i = 0; i < 14; i++) {
    const el = document.createElement("div");
    el.className = "deco";
    el.textContent = icons[Math.floor(Math.random() * icons.length)];
    const size = 22 + Math.random() * 20;
    el.style.fontSize = size + "px";
    document.body.appendChild(el);

    const state = {
      el, size,
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 0.9,
      vy: (Math.random() - 0.5) * 0.9,
    };

    (function animate(s) {
      function tick() {
        const W = window.innerWidth, H = window.innerHeight;
        s.x += s.vx; s.y += s.vy;
        if (s.x < 0)  { s.x = 0;  s.vx *= -1; }
        if (s.x > W)  { s.x = W;  s.vx *= -1; }
        if (s.y < 0)  { s.y = 0;  s.vy *= -1; }
        if (s.y > H)  { s.y = H;  s.vy *= -1; }
        s.el.style.left = s.x + "px";
        s.el.style.top  = s.y + "px";
        requestAnimationFrame(tick);
      }
      tick();
    })(state);
  }
})();

/* ── INIT ── */
generateScenario();
</script>
